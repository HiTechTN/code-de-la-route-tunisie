name: Deploy Web App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mobile_app/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile_app/package.json

      - name: Install dependencies
        working-directory: mobile_app
        run: npm install

      - name: Build web app
        working-directory: mobile_app
        run: npx expo export -p web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'mobile_app/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
