name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile_app/package-lock.json

      - name: Install dependencies
        working-directory: mobile_app
        run: npm install

      - name: Setup Expo CLI
        run: npm install -g eas-cli

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Web App
        working-directory: mobile_app
        run: npx expo export -p web

      - name: Package Web App
        working-directory: mobile_app
        run: |
          cd dist && zip -r ../web-app.zip .

      - name: Upload Web App artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: mobile_app/web-app.zip
          retention-days: 90

      - name: Build Android APK via EAS
        working-directory: mobile_app
        run: |
          BUILD_OUTPUT=$(eas build --platform android --profile preview --non-interactive 2>&1)
          echo "$BUILD_OUTPUT"
          # Extract build ID from output
          BUILD_ID=$(echo "$BUILD_OUTPUT" | grep -oP 'Build ID:\s*\K[a-f0-9]+' || true)
          if [ -z "$BUILD_ID" ]; then
            BUILD_ID=$(echo "$BUILD_OUTPUT" | grep -oP 'id:\s*\K[a-f0-9]+' | head -1 || true)
          fi
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Wait for EAS build
        working-directory: mobile_app
        run: |
          if [ -n "$BUILD_ID" ]; then
            echo "Waiting for build $BUILD_ID to complete..."
            eas build:view $BUILD_ID --json
            # Download the APK
            eas build:download --id $BUILD_ID --path ./app-release.apk
          else
            echo "No build ID found, attempting to download latest..."
            eas build:list --platform android --limit 1 --json
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile_app/app-release.apk
          if-no-files-found: warn
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release
        continue-on-error: true

      - name: Download Web App artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: ./release

      - name: List release files
        run: ls -la ./release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
