name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile_app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile_app
        run: npm install

      - name: Build Web App
        working-directory: mobile_app
        run: npx expo export -p web

      - name: Package Web App
        working-directory: mobile_app
        run: cd dist && zip -r ../web-app.zip .

      - name: Upload Web App artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: mobile_app/web-app.zip
          retention-days: 90

      - name: Generate Android native project
        working-directory: mobile_app
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK
        working-directory: mobile_app/android
        run: ./gradlew assembleRelease

      - name: Rename APK
        working-directory: mobile_app/android/app/build/outputs/apk/release
        run: cp app-release.apk ../../../web-app.zip 2>/dev/null || cp app-release.apk ../../../../code-de-la-route-tunisie-v${GITHUB_REF_NAME#v}.apk 2>/dev/null || true

      - name: Copy APK to workspace
        run: |
          APK_SRC="mobile_app/android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_SRC" ]; then
            cp "$APK_SRC" mobile_app/code-de-la-route-tunisie.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile_app/code-de-la-route-tunisie.apk
          if-no-files-found: warn
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release
        continue-on-error: true

      - name: Download Web App artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: ./release

      - name: Rename APK with version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -f "./release/code-de-la-route-tunisie.apk" ]; then
            cp "./release/code-de-la-route-tunisie.apk" "./release/code-de-la-route-tunisie-${TAG}.apk"
          fi

      - name: List release files
        run: ls -la ./release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
