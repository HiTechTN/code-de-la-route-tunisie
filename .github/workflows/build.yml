name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile_app/package-lock.json

      - name: Install dependencies
        working-directory: mobile_app
        run: npm install

      - name: Build Web App
        working-directory: mobile_app
        run: npx expo export -p web

      - name: Package Web App
        working-directory: mobile_app
        run: cd dist && zip -r ../web-app.zip .

      - name: Upload Web App artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: mobile_app/web-app.zip
          retention-days: 90

      - name: Setup Expo CLI
        run: npm install -g eas-cli

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit EAS Build
        id: eas-build
        working-directory: mobile_app
        run: |
          echo "Submitting EAS build..."
          BUILD_ID=$(eas build --platform android --profile preview --non-interactive --no-wait 2>&1 | tee /dev/stderr | grep -oP 'id:\s*\K[a-f0-9]+' | head -1)
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "EAS Build ID: $BUILD_ID"

      - name: Wait for EAS Build
        working-directory: mobile_app
        run: |
          BUILD_ID="${{ steps.eas-build.outputs.build_id }}"
          if [ -z "$BUILD_ID" ]; then
            echo "No build ID found, skipping..."
            exit 0
          fi
          
          echo "Waiting for EAS build $BUILD_ID..."
          MAX_ATTEMPTS=60
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            sleep 30
            STATUS=$(eas build:view $BUILD_ID --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - Status: $STATUS"
            
            if [ "$STATUS" = "finished" ]; then
              echo "Build completed! Downloading APK..."
              eas build:download --id $BUILD_ID --path ./code-de-la-route-tunisie.apk
              echo "BUILD_SUCCESS=true" >> "$GITHUB_ENV"
              exit 0
            elif [ "$STATUS" = "errored" ] || [ "$STATUS" = "canceled" ]; then
              echo "Build failed with status: $STATUS"
              eas build:view $BUILD_ID
              exit 0
            fi
          done
          
          echo "Build timed out after $MAX_ATTEMPTS attempts"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: env.BUILD_SUCCESS == 'true'
        with:
          name: android-apk
          path: mobile_app/code-de-la-route-tunisie.apk
          if-no-files-found: warn
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release
        continue-on-error: true

      - name: Download Web App artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: ./release

      - name: Rename APK with version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -f "./release/code-de-la-route-tunisie.apk" ]; then
            cp "./release/code-de-la-route-tunisie.apk" "./release/code-de-la-route-tunisie-${TAG}.apk"
          fi

      - name: List release files
        run: ls -la ./release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
